[platformio]
default_envs = waveshare_amoled_143

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc1-n16r8
framework = arduino

; Waveshare ESP32-S3-Touch-AMOLED-1.43: ESP32-S3R8, 16 MB flash, 8 MB OPI PSRAM.
board_build.partitions = default_16MB.csv

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    moononournation/GFX Library for Arduino@1.6.6

[env:waveshare_amoled_143]
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=0
    -DGLOBE_ENABLE_SERIAL_STATS=0
    -DGLOBE_ENABLE_SCREENSHOT=0
    -DGLOBE_TRANSFER_TIGHT=1
    -DGLOBE_USE_DIRECT_COLOR_TABLE=1
    -DGLOBE_RENDER_UNROLL=2
    -DGLOBE_USE_HALF_BACK_TEXTURE=1
    -DGLOBE_RENDER_O3=1
    -DGLOBE_RENDER_IRAM=1
    -DGLOBE_DISPLAY_BUS_HZ=80000000
    ; Best measured DMA chunk size for the 423x423 moving region.
    -DESP32QSPI_MAX_PIXELS_AT_ONCE=8192

[env:waveshare_amoled_143_debug]
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
    -DGLOBE_ENABLE_SERIAL_STATS=1
    -DGLOBE_ENABLE_SCREENSHOT=1
    -DGLOBE_TRANSFER_TIGHT=1
    -DGLOBE_USE_DIRECT_COLOR_TABLE=1
    -DGLOBE_RENDER_UNROLL=2
    -DGLOBE_USE_HALF_BACK_TEXTURE=1
    -DGLOBE_RENDER_O3=1
    -DGLOBE_RENDER_IRAM=1
    -DGLOBE_DISPLAY_BUS_HZ=80000000
    -DESP32QSPI_MAX_PIXELS_AT_ONCE=8192

; Quiet diagnostic build: no periodic logging or FPS overlay, but permits
; on-demand screenshot/performance queries over USB serial.
[env:waveshare_amoled_143_screenshot]
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -DGLOBE_ENABLE_SERIAL_STATS=0
    -DGLOBE_ENABLE_SCREENSHOT=1
    -DGLOBE_TRANSFER_TIGHT=1
    -DGLOBE_USE_DIRECT_COLOR_TABLE=1
    -DGLOBE_RENDER_UNROLL=2
    -DGLOBE_USE_HALF_BACK_TEXTURE=1
    -DGLOBE_RENDER_O3=1
    -DGLOBE_RENDER_IRAM=1
    -DGLOBE_DISPLAY_BUS_HZ=80000000
    -DESP32QSPI_MAX_PIXELS_AT_ONCE=8192
